name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Finding 005: test on both supported LTS versions.
        # Node 26 is excluded until better-sqlite3 adds support.
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Finding 002: use `npm ci` (not `npm install`) so the committed
      # lockfile is used exactly — no version drift between runs.
      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies (reproducible)
        run: npm ci

      # Finding 006: build must succeed before tests run.
      - name: Build
        run: npm run build

      # Finding 001/006: typecheck + jest in one gated step.
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npx jest --ci --forceExit

      - name: Coverage
        run: npx jest --ci --forceExit --coverage
        if: matrix.node-version == '22.x'
