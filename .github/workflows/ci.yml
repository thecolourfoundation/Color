name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install optional build deps
        run: npm install ws @types/ws

      - name: Patch tsconfig
        run: |
          node -e "
          const fs = require('fs');
          const t = JSON.parse(fs.readFileSync('tsconfig.json','utf8'));
          t.compilerOptions.skipLibCheck = true;
          t.exclude = [
            'node_modules','dist','tests',
            'src/channels/WhatsAppAdapter.ts',
            'src/channels/DiscordAdapter.ts'
          ];
          fs.writeFileSync('tsconfig.json', JSON.stringify(t,null,2));
          console.log('tsconfig patched');
          "

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - run: npm install
      - run: npm install ws @types/ws
      - name: Patch tsconfig
        run: |
          node -e "
          const fs = require('fs');
          const t = JSON.parse(fs.readFileSync('tsconfig.json','utf8'));
          t.compilerOptions.skipLibCheck = true;
          t.exclude = ['node_modules','dist','tests','src/channels/WhatsAppAdapter.ts','src/channels/DiscordAdapter.ts'];
          fs.writeFileSync('tsconfig.json', JSON.stringify(t,null,2));
          "
      - run: npm run build
