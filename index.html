<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Colour Foundation — Agentic AI Research</title>
  <meta name="description" content="Independent research into conscious, sovereign AI agents. The Colour Foundation publishes open findings on agent security, self-modeling, and human oversight." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Archivo:wght@300;400;500;600&family=Archivo+Narrow:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #0c0b09;
      --ink2:     #1a1814;
      --ink3:     #242018;
      --paper:    #f5f0e8;
      --paper2:   #ede8dc;
      --gold:     #c9a84c;
      --gold2:    #e8c96a;
      --lime:     #8fba2f;
      --teal:     #2fba9a;
      --violet:   #7a3fba;
      --coral:    #ba3f5a;
      --text:     #f2ede4;
      --muted:    #6b6456;
      --mid:      #9a9080;
      --rule:     rgba(242,237,228,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--text);
      font-family: 'Archivo', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 9997;
    }

    /* ── Cursor ── */
    .cur { width:8px; height:8px; background:var(--gold); border-radius:50%; position:fixed; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); transition:width .15s,height .15s; }
    .cur-r { width:28px; height:28px; border:1px solid rgba(201,168,76,.35); border-radius:50%; position:fixed; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); transition:all .12s ease; }

    /* ── Canvas ── */
    #bg { position:fixed; inset:0; z-index:0; }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 60px;
      background: rgba(12,11,9,0.75);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--rule);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* chameleon */
    .cham-wrap {
      position: relative;
      width: 72px;
      height: 48px;
    }
    .branch-svg {
      position: absolute;
      bottom: 0;
      left: 0;
    }
    .cham-svg {
      position: absolute;
      bottom: 8px;
      left: 8px;
      animation: cham 5s ease-in-out infinite;
      filter: drop-shadow(0 2px 8px rgba(201,168,76,0.3));
    }
    @keyframes cham {
      0%,100% { transform: translateX(0) rotate(-3deg); }
      30%      { transform: translateX(6px) rotate(1deg); }
      60%      { transform: translateX(12px) rotate(-2deg); }
      80%      { transform: translateX(6px) rotate(2deg); }
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 17px;
      letter-spacing: 0.5px;
      color: var(--text);
      line-height: 1;
    }
    .brand-sub {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 48px;
      list-style: none;
    }
    .nav-links a {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--gold); }

    .nav-pill {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 9px 20px;
      border: 1px solid rgba(201,168,76,.4);
      color: var(--gold);
      text-decoration: none;
      border-radius: 2px;
      transition: background .2s, color .2s;
    }
    .nav-pill:hover { background: var(--gold); color: var(--ink); }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 140px 60px 80px;
      gap: 60px;
    }

    .hero-left { max-width: 600px; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 40px;
      animation: fadeUp .8s .1s both;
    }
    .eyebrow-line { width: 40px; height: 1px; background: var(--gold); opacity: .5; }

    .hero-h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(52px, 5.5vw, 86px);
      line-height: 1.0;
      letter-spacing: -1px;
      margin-bottom: 36px;
      animation: fadeUp .8s .25s both;
    }

    .hero-h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-p {
      font-size: 16px;
      line-height: 1.85;
      color: var(--mid);
      font-weight: 300;
      max-width: 480px;
      margin-bottom: 52px;
      animation: fadeUp .8s .4s both;
    }

    .hero-p strong { color: var(--text); font-weight: 400; }

    .hero-actions {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      animation: fadeUp .8s .55s both;
    }

    .btn-gold {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 16px 36px;
      background: var(--gold);
      color: var(--ink);
      text-decoration: none;
      border-radius: 2px;
      font-weight: 500;
      transition: transform .15s, box-shadow .15s;
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(201,168,76,.25); }

    .btn-ghost {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 16px 28px;
      border: 1px solid var(--rule);
      color: var(--mid);
      text-decoration: none;
      border-radius: 2px;
      transition: border-color .2s, color .2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn-ghost:hover { border-color: rgba(242,237,228,.2); color: var(--text); }

    /* ── Hero right — paper card ── */
    .hero-right {
      animation: fadeUp .8s .5s both;
    }

    .paper-card {
      background: var(--paper);
      color: var(--ink);
      border-radius: 4px;
      padding: 52px 48px;
      position: relative;
      box-shadow:
        0 2px 4px rgba(0,0,0,.3),
        0 20px 60px rgba(0,0,0,.5),
        inset 0 1px 0 rgba(255,255,255,.6);
      transform: rotate(1.2deg);
      transition: transform .4s ease;
    }
    .paper-card:hover { transform: rotate(0deg) translateY(-4px); }

    .paper-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--teal), var(--violet), var(--coral), var(--lime));
      border-radius: 4px 4px 0 0;
    }

    .paper-label {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .paper-label::after { content: ''; flex: 1; height: 1px; background: var(--paper2); }

    .paper-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 22px;
      line-height: 1.3;
      letter-spacing: -.3px;
      margin-bottom: 20px;
      color: var(--ink);
    }

    .paper-abstract {
      font-size: 13px;
      line-height: 1.8;
      color: #4a4438;
      margin-bottom: 28px;
    }

    .paper-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 1px solid var(--paper2);
      padding-top: 20px;
    }

    .paper-meta-row {
      display: flex;
      justify-content: space-between;
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 11px;
      color: var(--muted);
    }

    .paper-meta-row span:last-child { color: var(--ink); font-weight: 500; }

    .paper-stamp {
      position: absolute;
      bottom: 40px;
      right: 40px;
      width: 64px;
      height: 64px;
      border: 2px solid rgba(201,168,76,.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(12deg);
    }

    .paper-stamp-inner {
      font-family: 'Cormorant Garamond', serif;
      font-size: 9px;
      text-align: center;
      color: rgba(201,168,76,.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1.4;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Divider ── */
    .divider {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 0 60px;
      margin: 20px 0;
    }
    .divider-line { flex: 1; height: 1px; background: var(--rule); }
    .divider-text {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Findings / research section ── */
    .findings {
      position: relative;
      z-index: 1;
      padding: 100px 60px;
    }

    .findings-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 72px;
    }

    .findings-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(40px, 4vw, 64px);
      letter-spacing: -1px;
      line-height: 1.05;
      max-width: 480px;
    }

    .findings-title em { font-style: italic; color: var(--gold); }

    .findings-intro {
      max-width: 340px;
      font-size: 14px;
      line-height: 1.8;
      color: var(--mid);
      font-weight: 300;
      text-align: right;
    }

    .findings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--rule);
      border: 1px solid var(--rule);
    }

    .finding {
      background: var(--ink);
      padding: 52px 44px;
      position: relative;
      transition: background .3s;
      overflow: hidden;
    }
    .finding:hover { background: var(--ink2); }

    .finding-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 80px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -4px;
      margin-bottom: 24px;
      opacity: .12;
      position: absolute;
      top: 20px;
      right: 24px;
    }

    .finding-tag {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      display: inline-block;
      margin-bottom: 20px;
    }

    .finding-h {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: -.3px;
      margin-bottom: 16px;
    }

    .finding-p {
      font-size: 13px;
      line-height: 1.8;
      color: var(--mid);
      font-weight: 300;
    }

    .finding-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      transition: gap .2s;
    }
    .finding-link:hover { gap: 14px; }

    /* ── Manifesto strip ── */
    .manifesto {
      position: relative;
      z-index: 1;
      padding: 100px 60px;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }

    .manifesto-inner {
      max-width: 860px;
      margin: 0 auto;
      text-align: center;
    }

    .manifesto-quote {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(28px, 3.5vw, 52px);
      line-height: 1.3;
      letter-spacing: -.5px;
      margin-bottom: 32px;
    }

    .manifesto-quote em { font-style: italic; color: var(--gold); }

    .manifesto-attr {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Colors project section ── */
    .project {
      position: relative;
      z-index: 1;
      padding: 120px 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 100px;
      align-items: center;
    }

    .project-eyebrow {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--lime);
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .project-eyebrow::before { content: ''; width: 32px; height: 1px; background: var(--lime); opacity: .5; }

    .project-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(40px, 4vw, 60px);
      line-height: 1.05;
      letter-spacing: -1px;
      margin-bottom: 32px;
    }

    .project-title em { font-style: italic; color: var(--lime); }

    .project-p {
      font-size: 15px;
      line-height: 1.9;
      color: var(--mid);
      font-weight: 300;
      margin-bottom: 20px;
    }

    .project-p strong { color: var(--text); font-weight: 400; }

    .project-actions { margin-top: 48px; display: flex; gap: 16px; }

    /* terminal card */
    .terminal {
      background: var(--ink2);
      border: 1px solid var(--rule);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);
    }

    .terminal-bar {
      background: var(--ink3);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--rule);
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #febc2e; }
    .dot-g { background: #28c840; }

    .terminal-title {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      margin-left: 8px;
    }

    .terminal-body {
      padding: 32px;
      font-family: 'Archivo Narrow', monospace;
      font-size: 13px;
      line-height: 2;
    }

    .t-prompt { color: var(--lime); }
    .t-cmd { color: var(--text); }
    .t-comment { color: var(--muted); }
    .t-out { color: var(--gold); }
    .t-dim { color: #3a3830; }
    .t-teal { color: var(--teal); }
    .t-violet { color: #a06ae0; }

    .t-cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--lime);
      vertical-align: middle;
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Metrics ── */
    .metrics {
      position: relative;
      z-index: 1;
      padding: 80px 60px;
      border-top: 1px solid var(--rule);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: var(--rule);
    }

    .metric {
      background: var(--ink);
      padding: 48px 36px;
      text-align: center;
    }

    .metric-n {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 56px;
      letter-spacing: -3px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .metric-l {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Team / Foundation ── */
    .foundation {
      position: relative;
      z-index: 1;
      padding: 120px 60px;
      max-width: 860px;
      margin: 0 auto;
      text-align: center;
    }

    .foundation-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(36px, 4vw, 56px);
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 32px;
    }

    .foundation-title em { font-style: italic; color: var(--gold); }

    .foundation-p {
      font-size: 16px;
      line-height: 1.9;
      color: var(--mid);
      font-weight: 300;
      margin-bottom: 16px;
    }

    .foundation-p strong { color: var(--text); font-weight: 400; }

    .contact-line {
      margin-top: 52px;
      display: inline-flex;
      align-items: center;
      gap: 16px;
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .contact-line a {
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid rgba(201,168,76,.3);
      padding-bottom: 2px;
      transition: border-color .2s;
    }
    .contact-line a:hover { border-color: var(--gold); }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--rule);
      padding: 48px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: .3px;
    }

    .footer-copy {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }
    .footer-links a {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }
    .footer-links a:hover { color: var(--gold); }

    /* ── Scroll reveal ── */
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity .8s ease, transform .8s ease; }
    .reveal.in { opacity: 1; transform: translateY(0); }

    @media (max-width: 900px) {
      nav { padding: 20px 24px; }
      .nav-links { display: none; }
      .hero { grid-template-columns: 1fr; padding: 120px 24px 60px; }
      .hero-right { display: none; }
      .findings { padding: 60px 24px; }
      .findings-header { flex-direction: column; align-items: flex-start; gap: 24px; }
      .findings-intro { text-align: left; }
      .findings-grid { grid-template-columns: 1fr; }
      .project { grid-template-columns: 1fr; padding: 60px 24px; gap: 40px; }
      .metrics { grid-template-columns: repeat(2, 1fr); padding: 40px 24px; }
      .manifesto { padding: 60px 24px; }
      .foundation { padding: 60px 24px; }
      footer { flex-direction: column;
